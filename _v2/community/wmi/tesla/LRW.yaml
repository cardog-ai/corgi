# Tesla Shanghai (Gigafactory 3)
# WMI: LRW - Assigned to Tesla Manufacturing Shanghai
#
# VIN Structure (positions 4-8 = VDS pattern positions 0-4):
#   4 (p0): Model - Y=Model Y, 3=Model 3
#   5 (p1): Body Type - G=Class D MPV 5DR LHD, H=RHD
#   6 (p2): Restraints - A/B/C/D (seatbelt/airbag config)
#   7 (p3): Fuel/Battery - E=Ternary Li-ion, F=LFP
#   8 (p4): Motor/Drive - D/E/F/J/K/L/R/S
#   9 (p5): Check Digit
#
# Source: Tesla MY2025 VIN Decoder, NHTSA FMVSS 565 submission

wmi: LRW

sources:
  - type: regulatory
    url: https://vpic.nhtsa.dot.gov/
    description: 'Tesla FMVSS 565 submission to NHTSA'
  - type: service_manual
    url: https://service.tesla.com/docs/ModelY/ServiceManual/en-us/GUID-0C797294-574D-4EE4-8017-C339A7D58411.html
    description: 'Tesla Model 3/Y Service Manual - VIN Decoding Section'
  - type: community
    description: 'Verified against 479 VINs from Cardog production database'

manufacturer: 'TESLA, INC.'
make: Tesla
country: CHINA
vehicle_type: Passenger Car
years:
  from: 2020
  to: null # ongoing

schema_name: 'Tesla Schema for LRW (China) - Model 3/Y'

patterns:
  # === Position 4 (p0): Model ===
  - pattern: 'Y*****'
    element: Model
    value: 'Model Y'

  - pattern: '3*****'
    element: Model
    value: 'Model 3'

  # === Position 5 (p1): Body Type ===
  - pattern: 'YG****'
    element: Body Class
    value: 'Sport Utility Vehicle (SUV)/Multi-Purpose Vehicle (MPV)'

  - pattern: 'YH****'
    element: Body Class
    value: 'Sport Utility Vehicle (SUV)/Multi-Purpose Vehicle (MPV)'

  - pattern: 'YG****'
    element: Doors
    value: '5'

  - pattern: 'YH****'
    element: Doors
    value: '5'

  - pattern: '3E****'
    element: Body Class
    value: 'Sedan/Saloon'

  - pattern: '3E****'
    element: Doors
    value: '4'

  # === Position 5 (p1): Steering/Market ===
  - pattern: '*G****'
    element: Other Restraint System Info
    value: 'Left Hand Drive (LHD)'

  - pattern: '*H****'
    element: Other Restraint System Info
    value: 'Right Hand Drive (RHD)'

  # === Position 7 (p3): Battery Type (stored as Other Engine Info) ===
  - pattern: '***E**'
    element: Other Engine Info
    value: 'Ternary System Li-ion Battery (NCA/NCM)'

  - pattern: '***F**'
    element: Other Engine Info
    value: 'Lithium Iron Phosphate Battery (LFP)'

  # === Position 8 (p4): Motor/Drive Unit - THIS DETERMINES TRIM ===
  # Model Y variants
  - pattern: 'Y***D*'
    element: Trim
    value: 'Standard Range'

  - pattern: 'Y***E*'
    element: Trim
    value: 'Long Range'

  - pattern: 'Y***F*'
    element: Trim
    value: 'Performance'

  - pattern: 'Y***J*'
    element: Trim
    value: 'Standard Range'

  - pattern: 'Y***K*'
    element: Trim
    value: 'Long Range'

  - pattern: 'Y***L*'
    element: Trim
    value: 'Performance'

  - pattern: 'Y***R*'
    element: Trim
    value: 'Standard Range'

  - pattern: 'Y***S*'
    element: Trim
    value: 'Standard Range'

  # Model 3 variants
  - pattern: '3***A*'
    element: Trim
    value: 'Standard Range Plus'

  - pattern: '3***B*'
    element: Trim
    value: 'Long Range'

  - pattern: '3***T*'
    element: Trim
    value: 'Performance'

  # === Position 8 (p4): Drive Type ===
  - pattern: '****D*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  - pattern: '****E*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****F*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****J*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  - pattern: '****K*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****L*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****R*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  - pattern: '****S*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  # Model 3 specific drive types
  - pattern: '****A*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  - pattern: '****B*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****T*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  # === Position 8 (p4): Motor Configuration ===
  - pattern: '****D*'
    element: Other Engine Info
    value: 'Single Motor - Standard'

  - pattern: '****E*'
    element: Other Engine Info
    value: 'Dual Motor - Standard'

  - pattern: '****F*'
    element: Other Engine Info
    value: 'Dual Motor - Performance'

  - pattern: '****J*'
    element: Other Engine Info
    value: 'Single Motor - Standard'

  - pattern: '****K*'
    element: Other Engine Info
    value: 'Dual Motor - Standard'

  - pattern: '****L*'
    element: Other Engine Info
    value: 'Dual Motor - Performance'

  - pattern: '****R*'
    element: Other Engine Info
    value: 'Single Motor - Standard'

  - pattern: '****S*'
    element: Other Engine Info
    value: 'Single Motor - Standard'

  # Model 3 motor configs
  - pattern: '****A*'
    element: Other Engine Info
    value: 'Single Motor - Standard/Performance'

  - pattern: '****B*'
    element: Other Engine Info
    value: 'Dual Motor - Standard'

  - pattern: '****T*'
    element: Other Engine Info
    value: 'Dual Motor - Performance'

  # === Fuel Type (all Tesla = Electric) ===
  - pattern: '******'
    element: Fuel Type - Primary
    value: 'Electric'

  - pattern: '******'
    element: Electrification Level
    value: 'BEV (Battery Electric Vehicle)'

  # === Plant Information (all LRW = Shanghai) ===
  - pattern: '******'
    element: Plant City
    value: 'SHANGHAI'

  - pattern: '******'
    element: Plant Country
    value: 'CHINA'

# Validation VINs (from production database)
test_vins:
  - vin: 'LRW3E1EB0PC932736'
    expected:
      make: Tesla
      model: Model 3
      body_class: Sedan
      year: 2023

  - vin: 'LRWYGDEE1PC010116'
    expected:
      make: Tesla
      model: Model Y
      trim: Long Range
      drive_type: AWD
      year: 2023

  - vin: 'LRWYGDFD5RC639046'
    expected:
      make: Tesla
      model: Model Y
      trim: Standard Range
      drive_type: RWD
      year: 2024
