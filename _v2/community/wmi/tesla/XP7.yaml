# Tesla Berlin (Gigafactory 4)
# WMI: XP7 - Assigned to Tesla Manufacturing Brandenburg (Grünheide)
#
# VIN Structure (positions 4-8 = VDS pattern positions 0-4):
#   4 (p0): Model - Y=Model Y
#   5 (p1): Body Type - G=Class D MPV 5DR LHD, H=RHD
#   6 (p2): Restraints - A/B/C/D (seatbelt/airbag config)
#   7 (p3): Fuel/Battery - E=Ternary Li-ion, F=LFP
#   8 (p4): Motor/Drive - D/E/F/J/K/L/R/S
#   9 (p5): Check Digit
#
# Note: Berlin currently only produces Model Y
# Source: Tesla MY2025 VIN Decoder, NHTSA FMVSS 565 submission

wmi: XP7

sources:
  - type: regulatory
    url: https://vpic.nhtsa.dot.gov/
    description: 'Tesla FMVSS 565 submission to NHTSA'
  - type: service_manual
    url: https://service.tesla.com/docs/ModelY/ServiceManual/en-us/GUID-0C797294-574D-4EE4-8017-C339A7D58411.html
    description: 'Tesla Model Y Service Manual - VIN Decoding Section'
  - type: regulatory
    description: 'German Kraftfahrt-Bundesamt (KBA) WMI Registration'

manufacturer: 'TESLA, INC.'
make: Tesla
country: GERMANY
vehicle_type: Passenger Car
years:
  from: 2022
  to: null # ongoing

schema_name: 'Tesla Schema for XP7 (Germany) - Model Y'

patterns:
  # === Position 4 (p0): Model ===
  - pattern: 'Y*****'
    element: Model
    value: 'Model Y'

  # === Position 5 (p1): Body Type ===
  - pattern: 'YG****'
    element: Body Class
    value: 'Sport Utility Vehicle (SUV)/Multi-Purpose Vehicle (MPV)'

  - pattern: 'YH****'
    element: Body Class
    value: 'Sport Utility Vehicle (SUV)/Multi-Purpose Vehicle (MPV)'

  - pattern: 'YG****'
    element: Doors
    value: '5'

  - pattern: 'YH****'
    element: Doors
    value: '5'

  # === Position 5 (p1): Steering/Market ===
  - pattern: '*G****'
    element: Other Restraint System Info
    value: 'Left Hand Drive (LHD)'

  - pattern: '*H****'
    element: Other Restraint System Info
    value: 'Right Hand Drive (RHD)'

  # === Position 7 (p3): Battery Type (stored as Other Engine Info) ===
  - pattern: '***E**'
    element: Other Engine Info
    value: 'Ternary System Li-ion Battery (NCA/NCM)'

  - pattern: '***F**'
    element: Other Engine Info
    value: 'Lithium Iron Phosphate Battery (LFP)'

  # === Position 8 (p4): Motor/Drive Unit - THIS DETERMINES TRIM ===
  - pattern: 'Y***D*'
    element: Trim
    value: 'Standard Range'

  - pattern: 'Y***E*'
    element: Trim
    value: 'Long Range'

  - pattern: 'Y***F*'
    element: Trim
    value: 'Performance'

  - pattern: 'Y***J*'
    element: Trim
    value: 'Standard Range'

  - pattern: 'Y***K*'
    element: Trim
    value: 'Long Range'

  - pattern: 'Y***L*'
    element: Trim
    value: 'Performance'

  - pattern: 'Y***R*'
    element: Trim
    value: 'Standard Range'

  - pattern: 'Y***S*'
    element: Trim
    value: 'Standard Range'

  # === Position 8 (p4): Drive Type ===
  - pattern: '****D*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  - pattern: '****E*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****F*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****J*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  - pattern: '****K*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****L*'
    element: Drive Type
    value: 'AWD/All-Wheel Drive'

  - pattern: '****R*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  - pattern: '****S*'
    element: Drive Type
    value: 'RWD/Rear-Wheel Drive'

  # === Position 8 (p4): Motor Configuration ===
  - pattern: '****D*'
    element: Other Engine Info
    value: 'Single Motor - Standard'

  - pattern: '****E*'
    element: Other Engine Info
    value: 'Dual Motor - Standard'

  - pattern: '****F*'
    element: Other Engine Info
    value: 'Dual Motor - Performance'

  - pattern: '****J*'
    element: Other Engine Info
    value: 'Single Motor - Standard'

  - pattern: '****K*'
    element: Other Engine Info
    value: 'Dual Motor - Standard'

  - pattern: '****L*'
    element: Other Engine Info
    value: 'Dual Motor - Performance'

  - pattern: '****R*'
    element: Other Engine Info
    value: 'Single Motor - Standard'

  - pattern: '****S*'
    element: Other Engine Info
    value: 'Single Motor - Standard'

  # === Fuel Type (all Tesla = Electric) ===
  - pattern: '******'
    element: Fuel Type - Primary
    value: 'Electric'

  - pattern: '******'
    element: Electrification Level
    value: 'BEV (Battery Electric Vehicle)'

  # === Plant Information (all XP7 = Berlin/Grünheide) ===
  - pattern: '******'
    element: Plant City
    value: 'GRUENHEIDE'

  - pattern: '******'
    element: Plant Country
    value: 'GERMANY'

# Validation VINs (from production database)
test_vins:
  - vin: 'XP7YGDEE6TB729697'
    expected:
      make: Tesla
      model: Model Y
      trim: Long Range
      drive_type: AWD
      year: 2024

  - vin: 'XP7YGDFD3TB123456'
    expected:
      make: Tesla
      model: Model Y
      trim: Standard Range
      drive_type: RWD
      year: 2024

  - vin: 'XP7YGDFF7TB789012'
    expected:
      make: Tesla
      model: Model Y
      trim: Performance
      drive_type: AWD
      year: 2024
